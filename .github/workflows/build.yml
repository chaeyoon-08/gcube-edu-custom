name: build gcube-edu-custom

on:
  workflow_dispatch:
    inputs:
      template:
        type: choice
        options:
          - edu-tensorflow-yonsei
        default: edu-tensorflow-yonsei
      base_image:
        type: string
        description: 'Base image (e.g. ghcr.io/<owner>/edu-dl-tensorflow:latest)'
      tag:
        type: string
        default: "1.0"

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  DOCKERHUB_OWNER: ${{ secrets.DOCKERHUB_OWNER }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /
      - name: Set lowercase owner
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}
      - name: Resolve base image
        id: base
        run: |
          if [ -n "${{ inputs.base_image }}" ]; then
            echo "image=${{ inputs.base_image }}" >> $GITHUB_OUTPUT
          else
            echo "image=ghcr.io/${{ env.OWNER_LC }}/edu-dl-tensorflow:latest" >> $GITHUB_OUTPUT
          fi
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.template }}
          file: ./${{ inputs.template }}/Dockerfile
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ inputs.template }}:${{ inputs.tag }}
            ${{ env.DOCKERHUB_OWNER }}/${{ inputs.template }}:${{ inputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          push: true